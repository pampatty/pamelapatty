<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Campo Tennis — Prenotazioni</title>
<style>
  :root {
    --green-dark:  #1a4a2e;
    --green-mid:   #2d7a4f;
    --green-light: #e8f5ee;
    --green-line:  #b8ddc8;
    --clay:        #c0392b;
    --gray-block:  #d0d0d0;
    --gray-text:   #888;
    --white:       #ffffff;
    --text:        #1a1a1a;
    --radius:      10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--green-light);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--green-dark);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.3px;
  }

  header p {
    font-size: 11px;
    color: var(--green-line);
    margin-top: 2px;
  }

  /* Month tabs */
  .month-tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 16px;
    background: var(--green-dark);
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }

  .month-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--green-mid);
    color: var(--green-line);
    background: transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .month-tab.active {
    background: var(--green-mid);
    color: white;
    border-color: var(--green-mid);
  }

  /* Day strip */
  .day-strip {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid var(--green-line);
    scrollbar-width: none;
    position: sticky;
    top: 68px;
    z-index: 90;
  }
  .day-strip::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    width: 44px;
    padding: 6px 0;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--green-line);
    background: white;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .day-btn .day-num { font-size: 16px; font-weight: 700; display: block; }
  .day-btn.active {
    background: var(--green-mid);
    color: white;
    border-color: var(--green-mid);
  }
  .day-btn.weekend { border-color: var(--clay); color: var(--clay); }
  .day-btn.weekend.active { background: var(--clay); color: white; border-color: var(--clay); }

  /* Time grid */
  .grid {
    padding: 12px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slot {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border-radius: var(--radius);
    padding: 10px 14px;
    border: 1px solid var(--green-line);
    min-height: 52px;
  }

  .slot.blocked {
    background: var(--gray-block);
    border-color: #c0c0c0;
    opacity: 0.7;
  }

  .slot-time {
    font-size: 13px;
    font-weight: 700;
    color: var(--green-mid);
    width: 42px;
    flex-shrink: 0;
  }
  .slot.blocked .slot-time { color: var(--gray-text); }

  .slot-divider {
    width: 1px;
    height: 28px;
    background: var(--green-line);
    flex-shrink: 0;
  }
  .slot.blocked .slot-divider { background: #bbb; }

  .slot-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    min-width: 0;
    -webkit-appearance: none;
  }
  .slot-input::placeholder { color: #ccc; font-weight: 400; font-size: 13px; }

  .slot-select {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    min-width: 0;
  }
  .slot-select option { color: var(--text); }

  .pausa-label {
    flex: 1;
    font-size: 12px;
    color: var(--gray-text);
    font-style: italic;
  }

  .slot-arrow {
    font-size: 16px;
    color: var(--green-line);
    flex-shrink: 0;
  }

  .slot-saved {
    font-size: 11px;
    color: var(--green-mid);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .slot-saved.show { opacity: 1; }

  /* Loading / status */
  .status-bar {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: var(--gray-text);
    background: var(--green-light);
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,74,46,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    color: white;
    gap: 14px;
  }
  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green-dark);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .empty-day {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-text);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div>Caricamento prenotazioni…</div>
</div>

<div class="toast" id="toast"></div>

<header>
  <h1>🎾 Campo da Tennis</h1>
  <p id="headerSub">Seleziona mese e giorno per prenotare</p>
</header>

<div class="month-tabs" id="monthTabs"></div>
<div class="day-strip" id="dayStrip"></div>
<div class="status-bar" id="statusBar">Connessione in corso…</div>
<div class="grid" id="grid"></div>

<script>
// ─── CONFIGURAZIONE ────────────────────────────────────────────────────────
// Sostituisci con l'URL del tuo Google Apps Script dopo averlo pubblicato
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwN39AtF_znJ384XN_GwjujPC0iDRi05-GjCquyvWroI_IoQ_4245Ybwr276eoxju1l/exec";
// ───────────────────────────────────────────────────────────────────────────

const MONTHS = [
  { label: "Giu", full: "Giugno 2026",    year: 2026, month: 6 },
  { label: "Lug", full: "Luglio 2026",    year: 2026, month: 7 },
  { label: "Ago", full: "Agosto 2026",    year: 2026, month: 8 },
  { label: "Set", full: "Settembre 2026", year: 2026, month: 9 },
  { label: "Ott", full: "Ottobre 2026",   year: 2026, month: 10 },
  { label: "Nov", full: "Novembre 2026",  year: 2026, month: 11 },
  { label: "Dic", full: "Dicembre 2026",  year: 2026, month: 12 },
];

const TIME_SLOTS = [];
for (let h = 9; h <= 21; h++) TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
const BLOCKED = new Set(["13:00","14:00"]);

const APTS = Array.from({length:74}, (_,i) => String(i+1).padStart(2,'0'));

const DAY_NAMES = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];

let currentMonth = 0;
let currentDay = null;
let cache = {}; // cache[key] = apt string

// ── Helpers ────────────────────────────────────────────────────────────────
function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}
function makeKey(year, month, day, slot) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}_${slot}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

// ── Render month tabs ──────────────────────────────────────────────────────
function renderMonthTabs() {
  const el = document.getElementById('monthTabs');
  el.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (i === currentMonth ? ' active' : '');
    btn.textContent = m.label;
    btn.onclick = () => { currentMonth = i; currentDay = null; renderMonthTabs(); renderDayStrip(); renderGrid(); };
    el.appendChild(btn);
  });
}

// ── Render day strip ───────────────────────────────────────────────────────
function renderDayStrip() {
  const el = document.getElementById('dayStrip');
  el.innerHTML = '';
  const {year, month} = MONTHS[currentMonth];
  const total = daysInMonth(year, month);

  // Auto-select today or first day
  if (currentDay === null) {
    const today = new Date();
    if (today.getFullYear() === year && today.getMonth()+1 === month) {
      currentDay = today.getDate();
    } else {
      currentDay = 1;
    }
  }

  for (let d = 1; d <= total; d++) {
    const date = new Date(year, month-1, d);
    const dow = date.getDay(); // 0=Dom, 6=Sab
    const isWeekend = dow === 0 || dow === 6;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (isWeekend ? ' weekend' : '') + (d === currentDay ? ' active' : '');
    btn.innerHTML = `<span>${DAY_NAMES[dow]}</span><span class="day-num">${d}</span>`;
    btn.onclick = () => { currentDay = d; renderDayStrip(); renderGrid(); };
    el.appendChild(btn);
    if (d === currentDay) setTimeout(() => btn.scrollIntoView({inline:'center', behavior:'smooth'}), 50);
  }
}

// ── Render grid ────────────────────────────────────────────────────────────
function renderGrid() {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  if (!currentDay) return;

  const {year, month, full} = MONTHS[currentMonth];
  document.getElementById('headerSub').textContent = `${full} — ${currentDay}`;

  TIME_SLOTS.forEach(slot => {
    const div = document.createElement('div');
    div.className = 'slot' + (BLOCKED.has(slot) ? ' blocked' : '');

    const timeEl = document.createElement('div');
    timeEl.className = 'slot-time';
    timeEl.textContent = slot;

    const divEl = document.createElement('div');
    divEl.className = 'slot-divider';

    div.appendChild(timeEl);
    div.appendChild(divEl);

    if (BLOCKED.has(slot)) {
      const p = document.createElement('div');
      p.className = 'pausa-label';
      p.textContent = '— pausa, campo chiuso —';
      div.appendChild(p);
    } else {
      const key = makeKey(year, month, currentDay, slot);
      const saved = cache[key] || '';

      const sel = document.createElement('select');
      sel.className = 'slot-select';

      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = 'Libero';
      sel.appendChild(empty);

      APTS.forEach(apt => {
        const opt = document.createElement('option');
        opt.value = apt;
        opt.textContent = `Apt. ${apt}`;
        if (apt === saved) opt.selected = true;
        sel.appendChild(opt);
      });

      let debounce;
      sel.onchange = () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => saveSlot(key, sel.value, savedEl), 300);
      };

      const savedEl = document.createElement('div');
      savedEl.className = 'slot-saved';
      savedEl.textContent = '✓';

      const arrow = document.createElement('div');
      arrow.className = 'slot-arrow';
      arrow.textContent = '▾';

      div.appendChild(sel);
      div.appendChild(arrow);
      div.appendChild(savedEl);
    }

    el.appendChild(div);
  });
}

// ── API calls ──────────────────────────────────────────────────────────────
async function loadAll() {
  if (APPS_SCRIPT_URL === "INSERISCI_QUI_URL_APPS_SCRIPT") {
    document.getElementById('loadingOverlay').classList.add('hidden');
    setStatus("⚠️ Apps Script non configurato — modalità demo");
    renderGrid();
    return;
  }
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getAll`);
    const data = await r.json();
    cache = data || {};
    setStatus("✓ Prenotazioni aggiornate");
  } catch(e) {
    setStatus("⚠️ Errore connessione");
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  renderGrid();
}

async function saveSlot(key, value, indicator) {
  cache[key] = value;
  try {
    const url = `${APPS_SCRIPT_URL}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`;
    await fetch(url, { method: 'GET', mode: 'no-cors' });
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 1500);
    showToast(value ? `Apt. ${value} prenotato ✓` : 'Prenotazione rimossa');
  } catch(e) {
    showToast('Errore salvataggio');
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
// Select current or nearest month
const now = new Date();
const idx = MONTHS.findIndex(m => m.year === now.getFullYear() && m.month === now.getMonth()+1);
currentMonth = idx >= 0 ? idx : 0;

renderMonthTabs();
renderDayStrip();
loadAll();
</script>
</body>
</html>
